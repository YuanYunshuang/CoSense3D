DATASET:
  name: lumpi
  data_info: &data_info
    det_r: 75.2
    voxel_size: [0.1, 0.1, 0.1]
  batch_size_train: 2

TRAIN:
#  project_name: 'centernet'
  wandb_account: 'opheliayuan'
  log_every: 2
  max_epoch: 100
  gpus: 1
  log_every_n_steps: 10
  check_val_every_n_epoch: 5
  resume: true
  optimizer:
    lr: 0.001
    weight_decay: 1e-2
    betas: [0.95, 0.999]
    milestones: [50, 80]
    gamma: 0.1

MODEL:
  backbone_3d:
    - mink_unet:
        in_dim: 8
        cache: ['p4']

  submodules:
    - compression:
        data_info: *data_info
        dense: true
        planes:
          - p4:
              steps: [ 4, 2 ]
              channels: [ 64, 128, 128 ]
    - ssfa:
        data_info: *data_info
        feature_num: 128
        stride: &stride 4

  heads:
    # stage 1
    - det_center_sparse:
        data_info: *data_info
        input_channels: 128
        predict_boxes_when_training: true
        last_module: ssfa
        stride: *stride
        shared_conv_channel: 64
        cls_head_cfg:
          name: SeparatedClsHead
        reg_head_cfg:
          name: UnitedRegHead
          combine_channels: true
          sigmoid_keys: ['scr']

        class_names_each_head: [
             ['vehicle.car',  'vehicle.truck', 'vehicle.bus',
              'vehicle.motorcycle', 'vehicle.cyclist', 'human.pedestrian']
#            ['vehicle.car'],
#            ['vehicle.truck'],
#            ['vehicle.bus'],
#            ['vehicle.motorcycle', 'vehicle.cyclist'],
#            ['human.pedestrian'],
        ]
        reg_channels:
          - 'box:6'
          - 'dir:8'
          - 'scr:4'

        target_assigner:
          data_info: *data_info
          meter_per_pixel: 0.4  # m
          detection_benchmark: CenterPoints
          assigners:
            - gaussian_center_map:
                gaussian_overlap: 0.1
                min_radius: 2
            - encode_box:
                _target_: model.utils.box_coder.CenterBoxCoder
                center_thresh: 0.1

        loss_cfg:
          center:
            _target_: model.losses.edl.edl_mse_loss
            args:
              annealing_step: 5000
          reg:
            _target_: model.losses.common.weighted_smooth_l1_loss

        post_processing:
          nms_thr: 0.1
          nms_premaxsize: 500

TEST:
  vis_function: false
  metrics:
    MetricObjDet:
      eval_func: cal_ap_all_point






