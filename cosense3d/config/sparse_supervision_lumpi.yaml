DATASET:
  name: lumpi
  dataset: early_fusion
  meta_path: /koko/cosense3d/lumpi-sparse
  DetectionBenchmark: Car
  data_info: &data_info
    det_r: 75.2
    voxel_size: [0.1, 0.1, 0.1]
  batch_size_train: 4
  n_workers: 4

  postprocessors:
    BevPostProcess:
      data_info: *data_info

TRAIN:
#  project_name: 'centernet'
  wandb_account: 'opheliayuan'
  log_every: 2
  max_epoch: 10
  gpus: 1
  log_every_n_steps: 10
  check_val_every_n_epoch: 5
  resume: true
  optimizer:
    lr: 0.001
    weight_decay: 1e-2
    betas: [0.95, 0.999]
    milestones: [25, 40]
    gamma: 0.1

MODEL:
  backbone_3d:
    - mink_unet:
        in_dim: 8
        cache: ['p4']

  submodules:
    - compression:
        data_info: *data_info
        dense: false
        planes:
          - p4:
              steps: [ 4, 2 ]
              channels: [ 64, 128, 128 ]
    - dilation_spconv:
        data_info: *data_info
        convs:
          p4:
            kernels: [5, 5, 3] # receiptive field: 2.0m
            in_dim: 128
            out_dim: 64
            expand_coordinates: True

  heads:
    - bev:
#        visualize_training: /home/yuan/Downloads/tmp.png
        data_info: *data_info
        stride: 4
        annealing_step: 50
        feature_src: dilation_spconv
        in_dim: 64
        sampling:
          annealing: false
          topk: false

    # stage 1
    - det_center_sparse:
        data_info: *data_info
        input_channels: 64
        predict_boxes_when_training: false
        feature_src: dilation_spconv
        shared_conv_channel: 64
        get_predictions: true
        stride: 4
        cls_head_cfg:
          name: UnitedClsHead
        reg_head_cfg:
          name: UnitedRegHead
          combine_channels: true
          sigmoid_keys: ['scr']  # named tensors in the dict to sigmoid outout

        class_names_each_head: [
             ['vehicle.car']
        ]
        reg_channels:
          - 'box:6'
          - 'dir:8'
          - 'scr:4'

        target_assigner:
          data_info: *data_info
          meter_per_pixel: 0.4  # m
          stride: 4
          detection_benchmark: Car
          assigners:
            - points_centerness: # a center point from sparse conv is the box center point
                min_radius: 1  #m
                batch_dict_key: 'det_center_head'
                sampling:
                  ratio: 1
            - encode_box:
                _target_: model.utils.box_coder.CenterBoxCoder
                center_thresh: 0.5

        loss_cfg:
          center:
            _target_: model.losses.edl.edl_mse_loss
            args:
              annealing_step: 5000
          reg:
            _target_: model.losses.common.weighted_smooth_l1_loss

        post_processing:
          nms_thr: 0.1
          nms_premaxsize: 500

TEST:
  metrics:
    MetricBev: []






