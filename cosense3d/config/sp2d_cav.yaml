DATASET:
  name: opv2v
  dataset: temporal_cosense
  meta_path: /koko/cosense3d/opv2v_full
  data_path: /koko/OPV2V
  DetectionBenchmark: Car
  data_info:
    lidar_range: [-140.8, -38.4, -3, 140.8, 38.4, 1]
    voxel_size:  [0.2, 0.2, 6]
  batch_size_train: 4
  n_workers: 4

  max_num_cavs: 7
  seq_len: &seq_len 1
  train_pipeline: 'pycfg.data_pipeline_lidar.pipeline_cpu'
  test_pipeline: 'pycfg.data_pipeline_lidar.pipeline_cpu'

TRAIN:
#  project_name: 'centernet'
  wandb_account: 'opheliayuan'
  log_every: 10
  max_epoch: 50
  gpus: 1
  hooks: 'pycfg.sp2d.train_hooks'
  optimizer:
    lr: 0.001
    weight_decay: 1e-2
    betas: [0.95, 0.999]
  lr_scheduler:
    policy: 'MultiStepLR'
    milestones: [10, 20]
    gamma: 0.1

TEST:
  hooks: 'pycfg.sp2d.test_hooks'


CONTROLLER:
  num_loss_frame: 1
  data_manager: 'pycfg.data_pipeline_lidar.data_manager'
  shared_modules: 'pycfg.sp2d.shared_modules'
  cav_manager:
    prototype: sp2d_cav.Sp2DCAV
    memory_len: *seq_len
    all_grad: true

VISUALIZATION:
  output_viewer:
    plots: 'pycfg.sp2d.plots'







