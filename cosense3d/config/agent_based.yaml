DATASET:
  name: opv2v
  dataset: temporal_cosense
  meta_path: /koko/cosense3d/opv2v_full
  data_path: /koko/OPV2V
  DetectionBenchmark: Car
  data_info: &data_info
    lidar_range: [-140.8, -38.4, -3, 140.8, 38.4, 3]
    voxel_size:  &voxel_size [0.2, 0.2, 6]
  batch_size_train: 4
  n_workers: 4

  max_num_cavs: 7
  seq_len: &seq_len 2
  train_pipeline: 'pycfg.data_pipeline.train_pipeline_cpu'

TRAIN:
#  project_name: 'centernet'
  wandb_account: 'opheliayuan'
  log_every: 2
  max_epoch: 50
  gpus: 1
  resume: true
  optimizer:
    lr: 0.001
    weight_decay: 1e-2
    betas: [0.95, 0.999]
    milestones: [25, 40]
    gamma: 0.1
  lr_scheduler:
    policy: 'CosineAnnealingWarm'
    epochs: 50
    warmup_lr: 2e-5
    warmup_epochs: 1
    lr_min: 2e-4

CONTROLLER:
  pre_process_train: 'pycfg.data_pipeline.train_pipeline_gpu'
  pre_process_test: 'pycfg.data_pipeline.test_pipeline_gpu'
  shared_modules: 'pycfg.mink2d_stride2_vox2_naive_lidar.shared_modules'
  cav_manager: {}
  forward_runner: {}

TEST:
  metrics:
    MetricBev: []






