TRAIN:
#  project_name: 'auto-cosense3d'
  wandb_account: 'opheliayuan'
  log_every: 2
  max_epoch: 50
  gpus: 1
  log_every_n_steps: 10
  check_val_every_n_epoch: 5
  resume: true
  optimizer:
    lr: 0.001
    weight_decay: 1e-2
    betas: [0.95, 0.999]
    milestones: [20, 45]
    gamma: 0.1


DATASET:
  name: V2Vreal
  data_path: "/data/v2vreal/train"
  meta_path: "./dataset/metas/v2vreal"
  visualize: false
  load_all: false

  voxel:
    features: 'x,y,z,d,c,s,i' # t:theta, d:depth, z:height, y:euclidean centers., x:euclidean centers., c:class, i:intensity
    coords: 'x,y,z'
    resolution: &voxel_size [0.2, 0.2, 0.2] # name:unit [theta: deg, depth: m, zyx: m]
    xyz_idx: &xyz_idx [0, 1, 2]
    voxel_feature_dim: &voxel_feature_dim 14 # encoded norm features + xyz
  crop:
#    d: &d [0, 50] # d_min, d_max
    x: [-102.4, 102.4] # z_min, z_max
    y: [-102.4, 102.4] # z_min, z_max
    z: &z [-3, 3] # z_min, z_max
  lidar_range: [-102.4, -102.4, -3, 102.4, 102.4, 3]
  normalize_features:
    dxy: &d [0, 100]
    z: *z

  augmentation: true
  preprocessors:
    args:
      DimensionlessCoordinates:
        voxel_size: *voxel_size
    train: ['DimensionlessCoordinates']
    val: ['DimensionlessCoordinates']
    test: ['DimensionlessCoordinates']

  batch_size_train: 2
  batch_size_val: 3
  batch_size_test: 8
  n_workers: 2
  shuffle: true

MODEL:
  name: 'cia_ssd'
  order: ['sparse_conv', 'm_compression', 'm_ssfa', 'h_detection']
  sparse_conv:
    in_dim: 14
    cache: ['p8']
  m_compression:
    - p8:
        steps: [ 2 ]
        channels: [ 128, 128 ]
  m_ssfa:
    feature_num: 128

  h_detection:
    # stage 1
    - s1:
        version: 'dense'
        det_r: &det_r 100
        voxel_size: &vs 0.2
        stride: 4
        in_dim: 64
        box_dim: [ 4.41, 1.98, 1.64 ]         # [l, w, h]
        box_z: 1.6                          # z of box center
        box_angles: [ 0, 90 ]                 # in degree
        iou_match: 0.4
        iou_unmatch: 0.2
        sample_size: 512



TEST:
  vis_function: false
  metrics:
    MetricStaticIou: none
    MetricDynamicIou:
      r: 100
      voxel_size: *voxel_size






