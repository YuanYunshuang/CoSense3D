DATASET:
  name: opv2v
  dataset: temporal_cosense
  meta_path: /koko/cosense3d/opv2v_full
  data_path: /koko/OPV2V
  DetectionBenchmark: Car
  data_info: &data_info
    lidar_range: [-140.8, -41.6, -3, 140.8, 41.6, 1]
    voxel_size: &voxel_size [ 0.1, 0.1, 0.1 ]
  batch_size_train: 4
  n_workers: 4

  max_num_cavs: 7
  seq_len: &seq_len 1
  train_pipeline: 'pycfg.fpvrcnn.pipeline_cpu'
  test_pipeline: 'pycfg.fpvrcnn.pipeline_cpu'

TRAIN:
#  project_name: 'centernet'
  wandb_account: 'opheliayuan'
  log_every: 10
  max_epoch: 50
  gpus: 1
  resume: true
  hooks: 'pycfg.fpvrcnn.train_hooks'
  optimizer:
    lr: 0.002
    weight_decay: 1e-4
    betas: [0.95, 0.999]
  lr_scheduler:
    policy: 'MultiStepLR'
    milestones: [15, 30]
    gamma: 0.1

TEST:
  hooks: 'pycfg.fpvrcnn.test_hooks'


CONTROLLER:
  num_loss_frame: 1
  data_manager: 'pycfg.fpvrcnn.data_manager'
  shared_modules: 'pycfg.fpvrcnn.shared_modules'
  cav_manager:
    prototype: fpvrcnn_cav.FpvrcnnCAV
    memory_len: *seq_len
    all_grad: true

VISUALIZATION:
  output_viewer:
    plots: 'pycfg.fpvrcnn.plots'







