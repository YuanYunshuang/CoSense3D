DATASET:
  name: opv2v
  dataset: temporal_cosense
  meta_path: /koko/cosense3d/opv2v_full
  data_path: /koko/OPV2V
  DetectionBenchmark: Car
  data_info: &data_info
    lidar_range: [-140.8, -38.4, -3, 140.8, 38.4, 3]
    voxel_size:  &voxel_size [0.2, 0.2, 0.2]
  batch_size_train: 4
  batch_size_test: 1
  n_workers: 4

  max_num_cavs: 7
  seq_len: &seq_len 1
  train_pipeline: 'pycfg.data_pipeline_lidar.pipeline_cpu'
  test_pipeline: 'pycfg.data_pipeline_lidar.pipeline_cpu'

TRAIN:
#  project_name: 'centernet'
  wandb_account: 'opheliayuan'
  log_every: 10
  max_epoch: 50
  gpus: 1
  resume: true
  hooks: 'pycfg.sp3d_stride2_vox2_naive_lidar.train_hooks'
  optimizer:
    lr: 0.001
    weight_decay: 1e-2
    betas: [0.95, 0.999]
  lr_scheduler:
    policy: 'MultiStepLR'
    milestones: [10, 20]
    gamma: 0.1

TEST:
  hooks: 'pycfg.sp3d_stride2_vox2_naive_lidar.test_hooks'


CONTROLLER:
  num_loss_frame: 1
  data_manager: 'pycfg.data_pipeline_lidar.data_manager'
  shared_modules: 'pycfg.sp3d_stride2_vox2_naive_lidar.shared_modules'
  cav_manager:
    prototype: sp3d_cav.Sp3DCAV
    memory_len: *seq_len
    all_grad: false

VISUALIZATION:
  output_viewer:
    plots: 'pycfg.sp3d_stride2_vox2_naive_lidar.plots'







