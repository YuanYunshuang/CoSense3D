DATASET:
  name: opv2v
  dataset: temporal_cosense
  meta_path: /koko/cosense3d/opv2v_full
  data_path: /koko/OPV2V
  DetectionBenchmark: Car
  data_info: &data_info
    lidar_range: [-140.8, -38.4, -3, 140.8, 38.4, 3]
    voxel_size:  &voxel_size [0.2, 0.2, 0.2]
  batch_size_train: 1
  n_workers: 4

  max_num_cavs: 7
  seq_len: &seq_len 1
  train_pipeline: 'pycfg.data_pipeline_lidar.pipeline_cpu'
  test_pipeline: 'pycfg.data_pipeline_lidar.pipeline_cpu'


CONTROLLER:
  num_loss_frame: 1
  data_manager: 'pycfg.data_pipeline_lidar.data_manager'
  shared_modules: {}
  cav_manager:
    prototype: base_cav.BaseCAV
    memory_len: *seq_len

VISUALIZATION:
  canvas_viewer:
    plots: 'pycfg.mink3d_stride2_vox2_naive_lidar.plots'







