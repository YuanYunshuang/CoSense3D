DATASET:
  data_path_train: "/koko/v2vreal/train"
  data_path_test: "/koko/v2vreal/test"
  meta_path: "/koko/cosense3d/v2vreal"
  visualize: false
  load_img: false
  load_lidar: true
  gt: ['bbx_center_global']

  batch_size_train: 4
  batch_size_val: 4
  batch_size_test: 4
  n_workers: 4
  shuffle: true

  voxel:
    features: 'x,y,z,d,c,s,i'
    resolution: &voxel_size [0.2, 0.2, 0.2] # name:unit [theta: deg, depth: m, zyx: m]
    xyz_idx: &xyz_idx [0, 1, 2]
    voxel_feature_dim: &voxel_feature_dim 14 # encoded norm features + xyz

  preprocessors:
    train:
        - ProjectPointsToEgo
        - GeoAugmentation
    test: &test_pp
      - ProjectPointsToEgo
    val: *test_pp

    ProjectPointsToEgo: {}

    GeoAugmentation:
      rotate: [0, 0, 180] # std in degree
      flip: xy # x | y | xy
      scale: 0.05
#      noise: 0.01


